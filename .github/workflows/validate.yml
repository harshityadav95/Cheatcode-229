name: Validate PR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate catalog and problem folders
        run: pnpm run generate

      - name: Verify generated files are committed
        run: |
          git diff --exit-code
          if [ -n "$(git status --short --untracked-files=all)" ]; then
            git status --short --untracked-files=all
            exit 1
          fi

      - name: Validate all generated Python and Go files
        run: pnpm test

      - name: Build static site
        run: pnpm build
